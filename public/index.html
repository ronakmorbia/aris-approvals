<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARIS · Approvals</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#F6F6F6;color:#18171A;min-height:100vh;font-size:14px}

/* Header */
header{background:#FFFFFF;border-bottom:0.5px solid #E5E2DB;position:sticky;top:0;z-index:100;padding-top:env(safe-area-inset-top)}.hinner{max-width:950px;margin:0 auto;padding:0 2.5rem;height:80px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.lm{width:30px;height:30px;background:#F5A500;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#18171A;font-family:'Inter',sans-serif}
.ln{font-size:14px;font-weight:600}
.ha{display:flex;align-items:center;gap:12px}

.rbtn,.rpbtn{display:inline-flex;align-items:center;height:38px;padding:0 20px;border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap;transition:all .15s;box-sizing:border-box}
.rbtn{background:#FFC107;color:#18171A;border:0.5px solid transparent}.rbtn:hover{opacity:.85}.rbtn:disabled{opacity:.5;pointer-events:none}
.rpbtn{background:transparent;color:#18171A;border:0.5px solid #C8C5BC}.rpbtn:hover{background:#F5F4F0}.rpbtn.active{background:#18171A;color:#FFFFFF;border-color:#18171A}
.rbtn:hover{opacity:.85}.rbtn:disabled{opacity:.5;pointer-events:none}

/* Main centred layout */
main{max-width:950px;margin:0 auto;padding:1.75rem 2.5rem}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.mc{background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:10px;padding:1rem 1.1rem}
.ml{font-size:9px;font-weight:500;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.mv{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:#18171A;margin-bottom:20px}
.mpill{display:inline-flex;align-items:center;justify-content:center;min-width:44px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#F5F4F0;color:#9E9B94;border:0.5px solid #E5E2DB;font-family:'Inter',sans-serif}


/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;border:0.5px solid #C8C5BC;background:transparent;color:#5C5A55;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s}
.chip:hover{background:#F5F4F0}
.chip.on{background:#FFC107;color:#18171A;border-color:#FFC107}.chip.on span{color:#5C5A55}

/* Groups */
.grp{margin-bottom:1.75rem}
.gh{display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:0.5px solid #E5E2DB;margin-bottom:10px}
.gd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gd-p{background:#C05A1A}.gd-o{background:#888780}.gd-d{background:#1E7A45}
.gl{font-size:11px;font-weight:500;color:#9E9B94;text-transform:uppercase;letter-spacing:.08em;flex:1}
.gc{font-size:11px;font-weight:500;padding:2px 9px;border-radius:999px;background:#F5F4F0;color:#5C5A55}

/* Cards — fixed width, no stretching */
.card{background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:14px;padding:22px 20px;margin-bottom:8px;cursor:pointer;transition:border-color .12s;width:100%}
.card:hover,.card.open{border-color:#C8C5BC}
.ch{display:flex;align-items:center;gap:12px;width:100%;min-width:0}
.cicon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cicon svg{width:16px;height:16px}
.ic-VPAY{background:#EEEDFE;color:#3C3489}
.ic-TD{background:#E1F5EE;color:#085041}
.ic-TRF{background:#FFF8E1;color:#633806}
.ic-EXP{background:#FEF0E6;color:#854F0B}
.ic-FD{background:#FBEAF0;color:#72243E}
.ic-CRM{background:#E6F1FB;color:#0C447C}
.ic-HR{background:#EAF3DE;color:#27500A}
.ic-GEN{background:#F5F4F0;color:#5C5A55}
.cmain{flex:1;min-width:0;overflow:hidden}
.ctitle{font-size:13px;font-weight:500;color:#18171A;line-height:1.35;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cancelled .ctitle{color:#9E9B94;text-decoration:line-through}
.cmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mdate{font-size:11px;color:#9E9B94;font-family:'Inter',sans-serif}
.mdot{font-size:10px;color:#C8C5BC}
.mpill2{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#F5F4F0;color:#5C5A55;border:0.5px solid #E5E2DB}
.mpill-g{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#EAF3DE;color:#27500A;border:0.5px solid #97C459}
.risk-H{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#FCEBEB;color:#791F1F;border:0.5px solid #F09595}
.risk-M{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.camount{font-size:15px;font-weight:500;font-family:'Inter',sans-serif;color:#18171A;white-space:nowrap;letter-spacing:-.3px;padding-left:14px;flex-shrink:0}

/* Panel */
.panel{display:none;margin-top:14px;padding-top:14px;border-top:0.5px solid #E5E2DB}
.panel.show{display:block}
.kv{display:grid;grid-template-columns:auto 1fr;row-gap:5px;column-gap:20px;margin-bottom:12px}
.kvl{font-size:11px;color:#9E9B94;font-weight:500;white-space:nowrap;line-height:1.9}
.kvv{font-size:12px;color:#18171A;font-weight:500;line-height:1.9;text-align:right}
.sep{height:0.5px;background:#E5E2DB;margin:10px 0}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
.tbl th{font-size:10px;font-weight:600;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;padding:5px 7px;text-align:left;border-bottom:0.5px solid #E5E2DB}
.tbl th:last-child{text-align:right}
.tbl td{padding:6px 7px;color:#18171A;border-bottom:0.5px solid #E5E2DB;vertical-align:middle}
.tbl td:last-child{text-align:right;font-family:'Inter',sans-serif;font-size:12px;font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.tbl-tot td{font-weight:600;border-top:0.5px solid #C8C5BC!important;border-bottom:none!important;padding-top:7px}
.cat-pay{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;background:#EEEDFE;color:#3C3489}
.cat-sal{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;background:#EAF3DE;color:#27500A}
.cat-exp{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;background:#E6F1FB;color:#0C447C}
.cat-fin{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;background:#FCEBEB;color:#791F1F}
.note{font-size:12px;color:#5C5A55;line-height:1.6;margin-bottom:12px}
.acts{display:flex;gap:6px;align-items:center}
textarea{width:100%;padding:8px 10px;border:0.5px solid #C8C5BC;border-radius:8px;font-size:12px;color:#18171A;background:#FFFFFF;resize:none;outline:none;margin-bottom:8px;font-family:'Inter',sans-serif}
textarea:focus{border-color:#9E9B94}
.ba{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;border:0.5px solid #1E7A45;background:#EAF3DE;color:#27500A;cursor:pointer;font-family:'Inter',sans-serif}
.ba:hover{background:#1E7A45;color:white}
.br{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;border:0.5px solid #A32D2D;background:#FCEBEB;color:#791F1F;cursor:pointer;font-family:'Inter',sans-serif}
.br:hover{background:#A32D2D;color:white}
.bo{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;border:0.5px solid #C8C5BC;background:#F5F4F0;color:#5C5A55;cursor:pointer;font-family:'Inter',sans-serif}
.bo:hover{background:#E5E2DB}
.rp{background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:14px;padding:24px;margin-bottom:1.5rem}
.rp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rp-title{font-size:14px;font-weight:600;color:#18171A}
.rp-sub{font-size:12px;color:#9E9B94}
.rp-actions{display:flex;gap:8px}
.rp-export{padding:6px 14px;background:#F5F4F0;color:#18171A;border:0.5px solid #C8C5BC;border-radius:999px;font-size:12px;font-weight:400;cursor:pointer;font-family:'Inter',sans-serif}
.rp-export:hover{background:#E5E2DB}
.rp table{width:100%;border-collapse:collapse;font-size:13px}
.rp th{font-size:11px;font-weight:500;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;border-bottom:0.5px solid #E5E2DB}
.rp th:last-child{text-align:right}
.rp td{padding:9px 10px;border-bottom:0.5px solid #F5F4F0;color:#18171A}
.rp td:last-child{text-align:right;font-weight:500}
.rp tr:last-child td{border-bottom:none}
.rp .grand-total td{font-weight:600;border-top:0.5px solid #C8C5BC;padding-top:10px}
.loading{text-align:center;padding:3rem;color:#9E9B94;font-size:13px}
.error-bar{background:#FCEBEB;color:#791F1F;padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.empty{text-align:center;padding:3rem;background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:12px}
.empty-t{font-size:15px;font-weight:500;color:#18171A;margin-bottom:4px}
.empty-s{font-size:13px;color:#9E9B94}
.ast{font-size:12px;font-weight:500}
.ast-ok{color:#1E7A45}.ast-er{color:#A32D2D}
.badge-done{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:#EAF3DE;color:#1E7A45;border:0.5px solid #97C459}
.auth-screen{text-align:center;padding:4rem 2rem;background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:12px;margin-top:2rem}
.auth-title{font-size:20px;font-weight:500;margin-bottom:8px}
.auth-sub{font-size:13px;color:#5C5A55;margin-bottom:2rem}
.auth-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:#18171A;color:white;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.auth-btn:hover{opacity:.85}
.auth-note{font-size:11px;color:#9E9B94;margin-top:1rem}

/* ── ROHAN VIEW ── */
.rohan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.rohan-month{font-size:18px;font-weight:600;color:#18171A}
.rohan-month span{font-size:13px;font-weight:400;color:#9E9B94;margin-left:6px}
.rohan-kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.rohan-exp-card{background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:14px;padding:20px;margin-bottom:10px}
.rohan-exp-card.submitted{border-color:#97C459;background:#F9FDF5}
.rec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.rec-left{flex:1;min-width:0}
.rec-dept{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9E9B94;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.rec-dept-dot{width:5px;height:5px;border-radius:50%;background:#FFC107;display:inline-block}
.rec-title{font-size:14px;font-weight:500;color:#18171A;line-height:1.35;margin-bottom:3px}
.rec-from{font-size:11px;color:#9E9B94}
.rec-right{text-align:right;flex-shrink:0}
.rec-amount{font-size:20px;font-weight:700;color:#18171A;letter-spacing:-.3px}
.rec-amount-label{font-size:9px;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.ai-box{background:#FAFAF8;border:0.5px solid #E5E2DB;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.ai-box-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9E9B94;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.ai-pulse{width:5px;height:5px;border-radius:50%;background:#FFC107;animation:aipulse 1.8s ease-in-out infinite}
@keyframes aipulse{0%,100%{opacity:1}50%{opacity:.3}}
.ai-spinner{width:12px;height:12px;border:1.5px solid #E5E2DB;border-top-color:#FFC107;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-text{font-size:12px;color:#3A3A3A;line-height:1.65;white-space:pre-wrap}
.rohan-note-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9E9B94;margin-bottom:5px}
.rohan-note-ta{width:100%;padding:8px 10px;border:0.5px solid #C8C5BC;border-radius:8px;font-size:12px;color:#18171A;background:#FFFFFF;resize:none;outline:none;font-family:'Inter',sans-serif;line-height:1.5}
.rohan-note-ta:focus{border-color:#9E9B94}
.rohan-note-ta:disabled{background:#F5F4F0;color:#9E9B94}
.rec-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:0.5px solid #F0EEE8}
.submitted-badge{font-size:11px;font-weight:600;color:#1E7A45;background:#EAF3DE;border:0.5px solid #97C459;padding:3px 10px;border-radius:999px}
.rohan-empty{text-align:center;padding:3rem;background:#FFFFFF;border:0.5px solid #E5E2DB;border-radius:12px}
.rohan-empty-t{font-size:15px;font-weight:500;color:#18171A;margin-bottom:4px}
.rohan-empty-s{font-size:13px;color:#9E9B94}


.mob-reports-wrap{display:none}

/* ── MOBILE / iPHONE ──────────────────────────────────────────────────────── */
@media (max-width: 768px) {

  /* Header — fixed layout, no scroll */
  .hinner {
    padding: 0 1.25rem;
    height: 64px;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .logo { flex-shrink: 0; }
  .logo img { height: 20px; }
  .ls { margin: 0 6px; }
  .lb { font-size: 12px; }
  .ts { display: none; }

  /* Header right — only Refresh + Reports dropdown */
  .ha { gap: 8px; flex-shrink: 0; overflow: visible; max-width: none; }
  .ha .rbtn { height: 34px; padding: 0 16px; font-size: 12px; }

  /* Hide individual report buttons on mobile */
  .ha .rpbtn { display: none; }

  /* Reports dropdown */
  .mob-reports-wrap { position: relative; display: inline-block; }
  .mob-reports-btn {
    height: 34px; padding: 0 14px; border-radius: 999px;
    background: #F6F6F6; color: #18171A; border: 0.5px solid #E5E2DB;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400;
    cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
  }
  .mob-reports-btn.active { background: #18171A; color: #FFFFFF; border-color: #18171A; }
  .mob-reports-dropdown {
    display: none; position: absolute; top: calc(100% + 6px); right: 0;
    background: #FFFFFF; border: 0.5px solid #E5E2DB; border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10); min-width: 160px; z-index: 200;
    overflow: hidden;
  }
  .mob-reports-dropdown.open { display: block; }
  .mob-reports-dropdown button {
    display: block; width: 100%; text-align: left;
    padding: 12px 16px; font-size: 13px; font-weight: 400;
    color: #18171A; background: none; border: none;
    font-family: 'Inter', sans-serif; cursor: pointer;
    border-bottom: 0.5px solid #F5F4F0;
  }
  .mob-reports-dropdown button:last-child { border-bottom: none; }
  .mob-reports-dropdown button:active { background: #F5F4F0; }
  .mob-reports-dropdown button.active { font-weight: 600; color: #18171A; }

  /* Main padding */
  main { padding: 1rem 1rem; }

  /* KPI grid — 3 columns on iPhone */
  .metrics { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 1rem; }
  .mc { padding: 0.75rem 0.85rem; border-radius: 10px; }
  .ml { font-size: 8px; margin-bottom: 6px; }
  .mv { font-size: 17px; margin-bottom: 12px; }
  .mpill { font-size: 9px; padding: 2px 6px; min-width: 36px; }
  .mc[style*="border-left"] { border-left: none !important; border-top: 2px solid #E5E2DB; }

  /* Filters — wrap into multiple rows */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .chip { font-size: 12px; padding: 5px 12px; }

  /* Cards */
  .card { border-radius: 12px; margin-bottom: 8px; }
  .card-header { padding: 14px 14px; }
  .card-body { padding: 0 14px 14px; }

  /* Report panel */
  .rp { padding: 16px; border-radius: 12px; }
  .rp table { font-size: 12px; }
  .rp th, .rp td { padding: 7px 6px; }
  .rp-hdr { flex-direction: column; gap: 10px; align-items: flex-start; }
}


  /* Hide purpose column in EXP rows on mobile */
  .exp-purpose { display: none; }
}

/* Very small phones */
@media (max-width: 375px) {
  .metrics { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .mv { font-size: 15px; }
}

</style>
</head>
<body>

<header>
<div class="hinner">
  <div class="logo">
    <img src="https://framerusercontent.com/images/DNuphwyKu50xjmPz9WCm4Cel6kk.png" alt="ARIS" style="height:32px;width:auto;display:block;">
    
  </div>
  <div class="ha">
    <button class="rpbtn" id="rpbtn-payables" onclick="toggleReport('payables')">Payables</button>
    <button class="rpbtn" id="rpbtn-expenses" onclick="toggleReport('expenses')">Expenses</button>
    <button class="rpbtn" id="rpbtn-finance" onclick="toggleReport('finance')">Finance Cost</button>
    <div class="mob-reports-wrap" id="mob-reports-wrap">
      <button class="mob-reports-btn" id="mob-reports-btn" onclick="toggleMobReports()">Reports ▾</button>
      <div class="mob-reports-dropdown" id="mob-reports-dropdown">
        <button onclick="mobSelectReport('payables')" id="mob-r-payables">Payables</button>
        <button onclick="mobSelectReport('expenses')" id="mob-r-expenses">Expenses</button>
        <button onclick="mobSelectReport('finance')" id="mob-r-finance">Finance Cost</button>
      </div>
    </div>
    <button class="rbtn" id="rbtn" onclick="loadInbox()">Refresh</button>
    <button class="rpbtn" id="rohan-toggle" onclick="toggleRohanTest()" style="display:none">👁 Rohan View</button>
  </div>
</div>
</header>

<main id="main">
  <div class="loading">Checking authentication…</div>
</main>

<script>
const TYPE_LABELS = {VPAY:'Vendor Pay',TD:'Trade Deposit',TRF:'Transfer',EXP:'Expenses',FD:'Fixed Deposit',CRM:'CRM',HR:'HR',GEN:'General'};
const ICONS = {
  VPAY:`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="4" width="13" height="8.5" rx="1.5"/><path d="M1.5 7h13M4.5 10.5h2"/></svg>`,
  TD:`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M5 7.5h6M5 10h4"/><path d="M5.5 3V1.5M10.5 3V1.5"/></svg>`,
  TRF:`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h10"/><path d="M10 2.5l3 2.5-3 2.5"/><path d="M13 11H3"/><path d="M6 8.5L3 11l3 2.5"/></svg>`,
  EXP:`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5L14 4.5v7L8 14.5 2 11.5v-7L8 1.5z"/><path d="M8 1.5v13M2 4.5l6 3 6-3"/></svg>`,

async function generateRohanAI(mid) {
  const exp = rohanExpenses.find(e => e.mid === mid);

  const istech = /tech|aws|cloud|saas|software|subscription|figma|cursor|anthropic|openai|atlassian|slack|notion|zoom|datadog/i.test(exp.subj + ' ' + (exp.dept||'') + ' ' + (exp.body||'').slice(0,200));
  const issalary = /salary|payroll|wages/i.test(exp.subj + ' ' + (exp.dept||''));

  const prompt = `You are an analyst helping review an expense request at ARIS (BSE-listed construction materials company). The expense email below was sent by a department to their finance reviewer.

Your job:
${istech ? `- Tech expense: Check if Jiten is mentioned as having reviewed it. If not: flag it. Summary: what tools, what for.` : ''}
${issalary ? `- Salary: Summarise in 2 sentences what happened this month — headcount, joiners, exits, increments, deductions, advances. Numbers only, no fluff.` : ''}
${!istech && !issalary ? `- General expense: Does each significant line item have a purpose or vendor reference? Flag any that don't. Summary: what these expenses are for in one sentence.` : ''}

Expense email:
${(exp.body||'').slice(0,1200)}

Respond in EXACTLY this format — nothing else:
SUMMARY: [one crisp sentence describing what this expense is — no mention of approval, submission, or review]
FLAG: [one sentence only if backup is genuinely missing — else leave completely empty]`;

  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    const raw = data.text || '';
    const summaryMatch = raw.match(/SUMMARY:\s*(.+)/i);
    const flagMatch = raw.match(/FLAG:\s*(.+)/i);
    exp.aiSummary = summaryMatch ? summaryMatch[1].trim() : raw.trim();

  rerenderRohanCard(mid);

function parseRohanRows(body) {
  // Parse line items from email body — same format as APP-EXP emails
  const rows = [];
  const lines = (body||'').split('\n');
  let active = false;
  const catColor = {'Payables':'#3C3489','Salary':'#27500A','Expenses':'#0C447C','Finance Cost':'#791F1F','Technology':'#0C447C'};
  const catBg = {'Payables':'#EEEDFE','Salary':'#EAF3DE','Expenses':'#E6F1FB','Finance Cost':'#FCEBEB','Technology':'#E6F1FB'};
  for (const line of lines) {
    const l = line.trim();
    if (/interest\s+expenses|top\s+\d+\s+expenses|expense\s+details|breakdown/i.test(l)) { active = true; continue; }
    if (/^best,|^regards|^thanks/i.test(l)) break;
    if (!active) continue;
    if (/expense\s+head|amount\s*\(rs|^-{3,}/i.test(l)) continue;
    const m = l.match(/^(.+?)\s{2,}([\d][\d,]+)\s*(.*)?$/);
    if (m) {
      const name = m[1].trim();
      const amt = parseInt(m[2].replace(/,/g,''));
      const purpose = (m[3]||'').trim();
      if (!name || amt <= 0 || /total|grand/i.test(name)) continue;
      // Categorise
      const s = (name+' '+purpose).toLowerCase();
      let cat = 'Expenses';
      if (/interest|ncd|bank charge|factoring|od |loan|finance|processing fee/i.test(s)) cat = 'Finance Cost';
      else if (/salary|payroll|wages|stipend/i.test(s)) cat = 'Salary';
      else if (/aws|azure|google cloud|techmagify|slack|figma|openai|anthropic|cursor|zoom|notion|datadog|saas|software/i.test(s)) cat = 'Technology';
      rows.push({ name, amt, purpose, cat, bg: catBg[cat]||'#E6F1FB', color: catColor[cat]||'#0C447C' });
    }
  }
  return rows;
}

function detectType(s){s=(s||'').toUpperCase();if(s.includes('APP-VPAY'))return'VPAY';if(s.includes('APP-TD'))return'TD';if(s.includes('APP-TRF'))return'TRF';if(s.includes('APP-EXP'))return'EXP';if(s.includes('APP-FD'))return'FD';if(s.includes('CRM'))return'CRM';if(s.includes('HR')||s.includes('APP-HR'))return'HR';return'GEN';}

function cleanTitle(s) {
  // Strip common prefixes from subject lines
  return (s||'')
    .replace(/^(Re:|RE:|Fwd:|FWD:)\s*/gi, '')
    .replace(/^APP-[A-Z]+-?\s*/gi, '')
    .replace(/^CRM-APP:\s*/gi, '')
    .replace(/^HR-APP:\s*/gi, '')
    .replace(/Rs\.?\s*[\d,]+\s*\/-?\s*/gi, '')
    .replace(/\s*-?\s*ASL\s*\d{2}-\d{2}-\d{4}\s*/gi, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function extractAmtFromSubject(s) {
  s = s || '';
  const cr = s.match(/(\d+\.?\d*)\s*Cr/i);
  if (cr) return '₹' + cr[1] + ' Cr';
  const rs = s.match(/Rs\.?\s*([\d,]+)/i);
  if (rs) {
    const num = parseInt(rs[1].replace(/,/g, ''));
    if (num >= 10000000) return '₹' + (num/10000000).toFixed(2) + ' Cr';
    if (num >= 100000) return '₹' + (num/100000).toFixed(2) + ' L';
    return '₹' + rs[1];
  }
  const l = s.match(/(\d+\.?\d*)\s*L(acs?|akhs?)?/i);
  if (l) return '₹' + l[1] + ' L';
  return '';
}
function extractAmt(s){const cr=(s||'').match(/(\d+\.?\d*)\s*Cr/i);if(cr)return'₹'+cr[1]+' Cr';const rs=(s||'').match(/Rs\.?\s*([\d,]+)/i);if(rs)return'₹'+rs[1];const l=(s||'').match(/(\d+\.?\d*)\s*Lacs?/i);if(l)return'₹'+l[1]+' L';return'';}
function smartName(from) {
  const s = (from || '').replace(/<[^>]+>/g, '').replace(/"/g, '').trim();
  if (!s) return '';
  // Bare email like trupti.gupta@aris.in
  if (s.includes('@') && !s.includes(' ')) {
    const local = s.split('@')[0];
    const part = local.split('.')[0];
    return part.charAt(0).toUpperCase() + part.slice(1);
  }
  // Display name like "Ajit Gawade <ajit@aris.in>"
  return s.split(/\s+/)[0];
}
function cleanFrom(f){return smartName(f);}
function formatDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});}catch(e){return d;}}
function decodeHtml(s){return(s||'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'").replace(/&quot;/g,'"');}

function getFiltered(){
  if(filter==='pending')return items.filter(i=>i.status==='pending');
  if(filter==='misc')return items.filter(i=>i.status==='fyi');
  if(filter==='approved')return items.filter(i=>i.status==='done');
  if(['Funds','CRM','HR','Tax'].includes(filter))return items.filter(i=>i.cat===filter && i.status!=='cancelled');
  // 'all' shows everything except cancelled
  return items.filter(i=>i.status!=='cancelled');
}

function setFilter(f){
  filter=f;
  renderAll();
}


function parseAmt(s) {
  if (!s) return 0;
  const cr = s.match(/₹\s*([\d.]+)\s*Cr/i);
  if (cr) return parseFloat(cr[1]) * 10000000;
  const l = s.match(/₹\s*([\d.]+)\s*L/i);
  if (l) return parseFloat(l[1]) * 100000;
  return 0;
}

function fmtAmt(n) {
  if (!n) return '—';
  if (n >= 10000000) return '₹' + Math.round(n/10000000) + ' Cr';
  if (n >= 100000) return '₹' + Math.round(n/100000) + ' L';
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function updateMetrics() {
  // Main number = approved (done) this month
  // Pill = pending (awaiting your approval)
  let tdDone=0, payDone=0, expDone=0, finDone=0, techDone=0;
  let tdPend=0, payPend=0, expPend=0, finPend=0, techPend=0;

  const now = new Date();
  const curMonth = now.getMonth();
  const curYear  = now.getFullYear();

  function itemMonth(item) {
    // Use date from subject (DD-MM-YYYY) as the expense date
    const m = (item.subj||'').match(/(\d{2})-(\d{2})-(\d{4})/);
    if (m) return { month: parseInt(m[2])-1, year: parseInt(m[3]) };
    // Fall back to email header date
    const d = new Date(item.date);
    return isNaN(d) ? null : { month: d.getMonth(), year: d.getFullYear() };
  }

  for (const item of items) {
    const amt = parseAmt(item.amount);
    const isDone = item.status === 'done';
    const isPend = item.status === 'pending';
    if (!isDone && !isPend) continue;

    // Only include current month expenses (use subject date, not approval date)
    const im = itemMonth(item);
    if (im && (im.month !== curMonth || im.year !== curYear)) continue;

    if (item.type === 'TD') {
      // Use full item.amount (confirmed total from email body)
      if (isDone) tdDone += amt;
      if (isPend) tdPend += amt;

    } else if (item.type === 'VPAY') {
      if (isDone) payDone += amt;
      if (isPend) payPend += amt;

    } else if (item.type === 'EXP') {
      const rows = item.rows || [];
      if (rows.length && amt > 0) {
        // Use rows to get category split, then scale to full amount
        let rFin=0, rTech=0, rExp=0;
        for (const r of rows) {
          const ra = parseAmt(r.amount);
          if (r.category === 'Finance Cost') rFin += ra;
          else if (r.category === 'Technology') rTech += ra;
          else rExp += ra;
        }
        const rowTotal = rFin + rTech + rExp;
        if (rowTotal > 0) {
          // Scale each category proportionally to the full email total
          const fin  = Math.round(amt * rFin  / rowTotal);
          const tech = Math.round(amt * rTech / rowTotal);
          const exp  = amt - fin - tech;
          if (isDone) { finDone += fin; techDone += tech; expDone += exp; }
          if (isPend) { finPend += fin; techPend += tech; expPend += exp; }
        } else {
          if (isDone) expDone += amt; if (isPend) expPend += amt;
        }
      } else {
        if (isDone) expDone += amt; if (isPend) expPend += amt;
      }
    }
  }

  const totalDone = payDone + expDone + finDone + techDone;  // TD excluded from total
  const totalPend = payPend + expPend + finPend + techPend;  // TD excluded from total

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  const setPill = (id, val) => {
    const el = document.getElementById(id);
    if (!el) return;
    const hasAmount = !!val;
    el.textContent = val || '₹0';
    el.style.display = 'inline-flex';
    // Red if pending amount, grey if zero
    if (hasAmount) {
      el.style.background = '#FCEBEB';
      el.style.color = '#791F1F';
      el.style.borderColor = '#F09595';
    } else {
      el.style.background = '#F5F4F0';
      el.style.color = '#9E9B94';
      el.style.borderColor = '#E5E2DB';
    }
  };

  set('m-td',       tdDone   ? fmtAmt(tdDone)   : '₹0');
  set('m-payables', payDone  ? fmtAmt(payDone)  : '₹0');
  set('m-expenses', expDone  ? fmtAmt(expDone)  : '₹0');
  set('m-finance',  finDone  ? fmtAmt(finDone)  : '₹0');
  set('m-tech',     techDone ? fmtAmt(techDone) : '₹0');
  set('m-total',    totalDone ? fmtAmt(totalDone) : '₹0');
  setPill('m-td-p',       tdPend   ? fmtAmt(tdPend)   : '');
  setPill('m-payables-p', payPend  ? fmtAmt(payPend)  : '');
  setPill('m-expenses-p', expPend  ? fmtAmt(expPend)  : '');
  setPill('m-finance-p',  finPend  ? fmtAmt(finPend)  : '');
  setPill('m-tech-p',     techPend ? fmtAmt(techPend) : '');
  setPill('m-total-p',    totalPend ? fmtAmt(totalPend) : '');
}

function renderCard(item){
  const open=openTid===item.tid;
  const isCancelledCard=item.status==='cancelled';
  // Use AI title if available, else clean the subject line
  const rawTitle = item.title && item.title !== item.subj ? item.title : cleanTitle(item.subj);
  const displayTitle = refineName(rawTitle);
  // Use AI amount if available, else extract from subject
  // For CRM: amount comes from credit limit field, not subject
  let displayAmount = item.amount || extractAmtFromSubject(item.subj);
  if (!displayAmount && item.type === 'CRM') {
    const clField = (item.fields||[]).find(f => f.label === 'Credit Limit');
    if (clField) displayAmount = clField.value.split('·')[0].trim();
  }
  const ast=actionStatus[item.tid]||{};
  const fromName=refineName(smartName(item.from||''));
  const namePill=fromName?`<span class="mpill2">${fromName}</span>`:'';
  const riskBadge=item.risk?`<span class="risk-${item.risk.charAt(0).toUpperCase()+item.risk.slice(1).toLowerCase()}">${item.risk.charAt(0).toUpperCase()+item.risk.slice(1)} Risk</span>`:'';
  const amtApproved=item.rohanApproved?`<span class="mpill-g">Amount Approved</span>`:'';
  let badge='';
  if(item.status==='fyi'&&item.approvalPill)badge=`<span class="mpill-g">${item.approvalPill}</span>`;
  else if(item.status==='done')badge=`<span class="badge-done">Approved</span>`;

  let panelContent='';
  if(item.fields&&item.fields.length){
    panelContent+=`<div class="kv">${item.fields.map(f=>`<span class="kvl">${f.label}</span><span class="kvv">${refineName(f.value)}</span>`).join('')}</div>`;
  }
  if(item.fields&&item.fields.length&&item.rows&&item.rows.length)panelContent+=`<div class="sep"></div>`;
  if(item.rows&&item.rows.length){
    const catColor={'Payables':'#3C3489','Salary':'#27500A','Expenses':'#0C447C','Finance Cost':'#791F1F'};
    const catBg={'Payables':'#EEEDFE','Salary':'#EAF3DE','Expenses':'#E6F1FB','Finance Cost':'#FCEBEB','Technology':'#E6F1FB','Travel':'#FEF3C7','Food & Stay':'#F0FDF4'};
    panelContent+=`<table class="tbl">
      <thead><tr><th>${item.type==='EXP'||item.type==='HR'?'Expense Head':item.type==='VPAY'?'Vendor':'Name'}</th>${item.type==='EXP'?'<th class="exp-purpose">Purpose</th>':''}<th>Category</th><th>Amount</th></tr></thead>
      <tbody>${item.rows.map(r=>`<tr><td>${r.name}</td>${item.type==='EXP'?`<td class="exp-purpose">${r.purpose||'—'}</td>`:''}<td><span style="font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;background:${catBg[r.category]||'#F5F4F0'};color:${catColor[r.category]||'#5C5A55'}">${r.category}</span></td><td>${r.amount}</td></tr>`).join('')}
      ${item.amount?`<tr class="tbl-tot"><td colspan="${item.type==='EXP'?3:2}">Total</td><td>${item.amount}</td></tr>`:''}</tbody></table>`;
  }
  if(item.note)panelContent+=`<div class="note">${item.note}</div>`;

  let actions='';
  if(item.status==='pending'){
    actions=`<textarea id="cmt-${item.tid}" rows="2" placeholder="Add a comment (optional)…"></textarea>
    <div class="acts">
      <button class="ba" onclick="event.stopPropagation();doAction('${item.tid}','approve')">✓ Approve</button>
      <button class="br" onclick="event.stopPropagation();doAction('${item.tid}','reject')">✕ Reject</button>
      ${ast.text?`<span class="ast ast-${ast.cls}">${ast.text}</span>`:''}
    </div>`;
  }else if(item.status==='fyi'){
    actions=`<div class="acts"><button class="bo" onclick="event.stopPropagation();doAction('${item.tid}','okay')">✓ Mark Done</button>${ast.text?`<span class="ast ast-${ast.cls}">${ast.text}</span>`:''}</div>`;
  }

  return`<div class="card${open?' open':''} ${isCancelledCard?'cancelled':''}" onclick="toggleCard('${item.tid}')">
    <div class="ch">
      <div class="cicon ic-${item.type}">${ICONS[item.type]||ICONS.GEN}</div>
      <div class="cmain">
        <div class="ctitle">${displayTitle}</div>
        <div class="cmeta">
          <span class="mdate">${item.date}</span><span class="mdot">·</span>
          ${namePill}
          ${amtApproved?`<span class="mdot">·</span>${amtApproved}`:''}
          ${riskBadge?`<span class="mdot">·</span>${riskBadge}`:''}
          ${badge?`<span class="mdot">·</span>${badge}`:''}
        </div>
      </div>
      <span class="camount">${displayAmount}</span>
    </div>
    <div class="panel${open?' show':''}">
      ${panelContent}
      ${actions}
    </div>
  </div>`;
}

async function doAction(tid,action){
  const item=items.find(i=>i.tid===tid);
  const cmtEl=document.getElementById('cmt-'+tid);
  const comment=cmtEl?cmtEl.value.trim():'';
  actionStatus[tid]={text:'Sending…',cls:''};
  renderCards();
  if(action==='okay'){
    try{const r=await fetch('/api/gmail?action=mark-read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tokens,tid})});const d=await r.json();if(d.refreshedTokens)saveTokens(d.refreshedTokens);}catch(e){}
    const idx=items.findIndex(i=>i.tid===tid);if(idx>=0)items.splice(idx,1);delete actionStatus[tid];openTid=null;renderAll();return;
  }
  const body=action==='approve'?(comment?`Approved.\n\n${comment}`:'Approved.'):(comment?`Rejected.\n\n${comment}`:'Rejected.');
  try{
    const r=await fetch('/api/gmail?action=send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tokens,tid,to:item.to,cc:item.cc,subject:item.subj,body})});
    const d=await r.json();
    if(d.refreshedTokens)saveTokens(d.refreshedTokens);
    if(!d.ok)throw new Error(d.error||'Send failed');
    actionStatus[tid]={text:action==='approve'?'Sent — Approved ✓':'Sent — Rejected ✓',cls:'ok'};
    const idx=items.findIndex(i=>i.tid===tid);if(idx>=0)items[idx].status='done';
    setTimeout(()=>{openTid=null;delete actionStatus[tid];renderAll();},1500);
  }catch(e){actionStatus[tid]={text:'Error: '+e.message,cls:'er'};renderCards();}
}

// ── Global name helpers ───────────────────────────────────────────────────
const CAPS_WORDS = new Set(['asl','aris','icici','hdfc','idbi','axis','sbi','ncd','gst','llp','pvt','ltd','bipl','atpl','acmpl','wrpl','aws','api','crm','erp','emi','neft','rtgs','upi','otp','kyc','pan','gst','dpo','rmc','od','ca']);

function toTitleCase(s) {
  return (s||'').replace(/[\w&]+/g, t => {
    const lower = t.toLowerCase();
    if (CAPS_WORDS.has(lower)) return t.toUpperCase();
    return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
  });
}

function refineName(s) {
  if (!s) return s;
  const t = s.trim();
  const key = t.toLowerCase().replace(/\s*[-–]+\s*$/, '').trim();
  const exact = {
    'arisinfra solutions limited':'ARIS','arisinfra solutions private limited':'ARIS','arisinfra solutions':'ARIS','arisinfra':'ARIS',
    'buildmex infra private limited':'BM','buildmex infra':'BM','buildmex':'BM','bipl':'BM',
    'natureresidences real estate development private limited':'NRDPL','natureresidences real estate development':'NRDPL',
    'natureresidences realtors private limited':'NRPL','natureresidences realtors':'NRPL',
    'arisinfra constructions maharashtra private limited':'ACMPL','arisinfra constructions':'ACMPL','acmpl':'ACMPL',
    'whiteroots infra private limited':'WR','whiteroots infra':'WR','whiteroots':'WR','wrpl':'WR',
    'chennai mines private limited':'CMPL','shri chennai mines':'CM','chennai mines':'CM',
    'ps blue metals':'PS Blue','p.s. blue metals':'PS Blue',
    'apar infra solutions private limited':'Apar Infra','apar infra solutions':'Apar Infra',
    'netwin roadways':'Netwin Roadways','sarvadnya enterprises':'Sarvadnya',
    'satyam ventures projects private limited':'Satyam Ventures',
    'gvee infra pvt ltd':'GVEE Infra','gvee infra':'GVEE Infra',
    'google clouds':'Google Cloud','google cloud':'Google Cloud',
    'atlasian':'Atlassian','atlassian':'Atlassian','slack':'Slack','sazs apps':'Sazs Apps',
    'aws':'AWS','openai':'OpenAI','mufg':'MUFG Bank','rbsa advisors':'RBSA Advisors',
    'thanawala consultancy':'Thanawala Consultancy','vesta legal':'Vesta Legal',
    'creativeit':'Creative IT','creative it':'Creative IT','techmagify':'TechMagify',
    'tata aig':'Tata AIG','rebrandly':'Rebrandly','gupshup':'Gupshup','cursor':'Cursor',
    'anthropic':'Anthropic','figma':'Figma','dropbox':'Dropbox','airtel':'Airtel',
    'relic':'Relic','texterity':'Texterity','sunx':'Sun-X','sun-x concrete india private limited':'Sun-X',
    'manish bohra':'Manish Bohra','corpcomm studio - annual report design':'Corpcomm Studio',
    'corpcomm studio':'Corpcomm Studio','admin - rent, utility & vendor payments':'Admin & Vendor Payments',
    'rubix (tata insurance) -':'Rubix (Tata Insurance)','rubix (tata insurance)':'Rubix (Tata Insurance)',
    's&t legal -':'S&T Legal','s&t legal':'S&T Legal','arbitration':'Arbitration Fees',
  };
  if (exact[key]) return exact[key];
  const corpCC = key.match(/^corp cc\s*[-–]\s*(.+)$/i);
  if (corpCC) return toTitleCase(corpCC[1].trim()) + ' Corporate Card';
  const legalSuffixes = /\s+(private limited|pvt\.?\s*ltd\.?|limited|llp|solutions private limited|infra private limited|projects private limited|ventures private limited|enterprises private limited|constructions private limited|realtors private limited|real estate development private limited)$/i;
  const stripped = t.replace(/\s*[-–]+\s*$/, '').trim();
  const withoutSuffix = stripped.replace(legalSuffixes, '').trim();
  if (withoutSuffix.length < stripped.length && withoutSuffix.length > 2) return toTitleCase(withoutSuffix);
  return toTitleCase(stripped);
}

function renderReportPanel() {
  const main = document.getElementById('main');
  if (!main) return;
  let panel = document.getElementById('report-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'report-panel';
    main.insertBefore(panel, main.firstChild);
  }


  const titles = { payables:'Payables Report', expenses:'Expenses Report', finance:'Finance Cost Report' };
  const data = reportCache[activeReport];

  if (!data) {
    panel.innerHTML = `<div class="rp"><div class="loading">Loading ${titles[activeReport]}…</div></div>`;
    return;
  }

  const { rows, grandTotal, totalEmails, month } = data;
  const fmtAmt = n => n>=10000000 ? '₹'+(n/10000000).toFixed(2)+' Cr' : n>=100000 ? '₹'+(n/100000).toFixed(2)+' L' : '₹'+Math.round(n).toLocaleString('en-IN');
  const nameCol = activeReport === 'payables' ? 'Vendor' : 'Expense Head';

  // For expenses report — group by category with subtotals
  let tableBody = '';
  if (activeReport === 'expenses' && data.categories) {
    const cats = data.categories; // { catName: [rows] }
    let rank = 1;
    for (const [cat, catRows] of Object.entries(cats)) {
      const catTotal = catRows.reduce((s,r) => s+r.total, 0);
      tableBody += `<tr style="background:#F5F4F0"><td colspan="2" style="font-size:11px;font-weight:600;color:#5C5A55;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px">${cat}</td><td colspan="2" style="text-align:right;font-size:12px;font-weight:600;color:#5C5A55;padding:8px 10px">${fmtAmt(catTotal)}</td></tr>`;
      for (const r of catRows) {
        tableBody += `<tr><td style="color:#9E9B94;font-size:12px">${rank++}</td><td>${refineName(r.vendor)}</td><td style="color:#9E9B94;font-size:12px">${r.count}×</td><td>${fmtAmt(r.total)}</td></tr>`;
      }
    }
  } else {
    rows.forEach((r,i) => {
      tableBody += `<tr><td style="color:#9E9B94;font-size:12px">${i+1}</td><td>${refineName(r.vendor)}</td><td style="color:#9E9B94;font-size:12px">${r.count}×</td><td>${fmtAmt(r.total)}</td></tr>`;
    });
  }

  panel.innerHTML = `<div class="rp">
    <div class="rp-hdr">
      <div>
        <div class="rp-title">${titles[activeReport]} — ${month}</div>
        <div class="rp-sub">${rows.length} ${activeReport==='payables'?'vendors':'items'} · ${totalEmails} batches · ${fmtAmt(grandTotal)} total</div>
      </div>
      <div class="rp-actions">
        <button class="rp-export" onclick="exportReport()">Export CSV</button>
      </div>
    </div>
    <table>
      <thead><tr><th>#</th><th>${nameCol}</th><th>Count</th><th>Total Amount</th></tr></thead>
      <tbody>${tableBody}<tr class="grand-total"><td colspan="3">Total</td><td>${fmtAmt(grandTotal)}</td></tr></tbody>
    </table>
  </div>`;
}

async function loadReport(type) {
  try {
    const r = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tokens, type })
    });
    const data = await r.json();
    if (data.refreshedTokens) saveTokens(data.refreshedTokens);
    reportCache[type] = data;
    if (activeReport === type) renderReportPanel();
  } catch(e) {
    const panel = document.getElementById('report-panel');
    if (panel) panel.innerHTML = `<div class="rp"><div class="loading">Error: ${e.message}</div></div>`;
  }
}

function exportReport() {
  const data = reportCache[activeReport];
  if (!data) return;
  const { rows, month } = data;
  const titles = { payables:'Payables', expenses:'Expenses', finance:'Finance_Cost' };
  const fmtAmt = n => n>=10000000 ? (n/10000000).toFixed(2)+' Cr' : n>=100000 ? (n/100000).toFixed(2)+' L' : Math.round(n).toLocaleString('en-IN');
  const lines = ['Name,Count,Total Amount', ...rows.map(r => `"${refineName(r.vendor)}",${r.count},${fmtAmt(r.total)}`)];
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${titles[activeReport]}_${month.replace(' ','_')}.csv`;
  a.click();
}

// Auto-poll every 90 seconds
const POLL_INTERVAL=90*1000;let pollTimer=null,isPolling=false;
async function silentRefresh(){
  if(!tokens||isPolling)return;isPolling=true;
  try{
    const r=await fetch('/api/gmail?action=inbox',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tokens})});
    const d=await r.json();if(d.error)throw new Error(d.error);if(d.refreshedTokens)saveTokens(d.refreshedTokens);
    const newItems=d.items.map(item=>({...item,type:detectType(item.subj),amt:extractAmt(item.subj),from:cleanFrom(item.from),date:formatDate(item.date),snip:decodeHtml(item.snippet)}));
    const sig=newItems.map(i=>i.tid+i.read).join('|'),oldSig=items.map(i=>i.tid+i.read).join('|');
    if(sig!==oldSig){items=newItems;renderAll();}
  }catch(e){
    if(e.message&&(e.message.includes('invalid_grant')||e.message.includes('401'))){saveTokens(null);localStorage.removeItem('aris_tokens');stopPolling();showAuth();}
  }finally{isPolling=false;}
}
function startPolling(){stopPolling();pollTimer=setInterval(silentRefresh,POLL_INTERVAL);}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
document.addEventListener('visibilitychange',()=>{if(document.hidden){stopPolling();}else if(tokens){silentRefresh();startPolling();}});
</script>
